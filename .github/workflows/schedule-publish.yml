name: 예약 빌드 트리거

on:
  schedule:
    # 매일 한국시간 기준: 9시, 12시, 15시, 18시, 21시 (UTC+9 → UTC로 변환)
    - cron: '0 0 * * *'   # KST 09:00
    - cron: '0 3 * * *'   # KST 12:00
    - cron: '0 6 * * *'   # KST 15:00
    - cron: '0 9 * * *'   # KST 18:00
    - cron: '0 12 * * *'  # KST 21:00
  workflow_dispatch: # GitHub UI 또는 대시보드에서 수동 실행 가능

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
      - name: Cloudflare Pages 빌드 트리거
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.CF_DEPLOY_HOOK_URL }}")
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ Cloudflare 빌드 트리거 성공 (HTTP $HTTP_STATUS)"
          else
            echo "❌ Cloudflare 빌드 트리거 실패 (HTTP $HTTP_STATUS)"
            exit 1
          fi
